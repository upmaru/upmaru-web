          \n\nHey there! I've dug up some of the absolute best animated movies that are topping the charts right now. It's like a treasure hunt for gold, but instead of gold, we found incredible stories and stunning animation! 🎬✨\n\nHere are the top hits I found for you:\n\n1.  **The Wild Robot** - This one is a real gem! It has an **Average Rating** of 8.3 from over 5,500 voters. The story follows a clever robot named Roz who gets stranded on an island and has to bond with local wildlife to survive. It's got heart, adventure, and some serious emotional depth.\n2.  **Inside Out 2** - You can't go wrong with Pixar! This sequel dives into Riley's mind as new emotions like Anxiety join the crew. It holds a solid **Average Rating** of 7.5 with more than 6,300 votes. It's a funny, touching, and relatable look at growing up.\n3.  **Kung Fu Panda 4** - Po is back! In this adventure, he's looking for a new Dragon Warrior while facing a villainous Chameleon. With an **Average Rating** of 7.0 from 3,300 fans, it's a fun, action-packed ride for all ages.\n\nI've put together a visual display of these movies so you can see their posters and get a quick vibe of what they're about. Check out the grid below!\n\nIf you're looking for something specific—like classic 90s cartoons, TV series, or maybe something from a particular studio—just let me know, and I'll refine the search! Happy watching! 🍿
